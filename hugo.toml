baseURL = "https://stormacq.com"
languageCode = "en-us"
title = "Seb in the ☁️"
theme = "PaperMod"


[params]
  author = "Sébastien Stormacq"
  email = "sebastien.stormacq@gmail.com"
  description = "Developer Advocate @ AWS. I write about the cloud & Swift<br/>(opinions are my own)"
  twitter_username = "sebsto"
  github_username = "sebsto"
  linkedin_username = "sebastienstormacq"
  homePostCount = 10

  # PaperMod params
  env = "production"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  defaultTheme = "light"
  disableThemeToggle = true

  [params.homeInfoParams]
    Title = "Seb in the ☁️"
    Content = "Developer Advocate @ AWS. This blog is about AWS Cloud, Swift & Mobile (opinions are my own)"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/sebsto"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/sebsto"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/sebastienstormacq"

  [[params.socialIcons]]
    name = "bluesky"
    url = "https://bsky.app/profile/sebsto.bsky.social"

  [[params.socialIcons]]
    name = "rss"
    url = "/feed.xml"

  [params.cover]
    linkFullImages = true

  [params.assets]
    favicon = "/favicon.ico"

[permalinks]
  [permalinks.page]
    posts = "/:year/:month/:day/:slug/"

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS"]

[outputFormats.RSS]
  mediaType = "application/rss+xml"
  baseName = "feed"

[markup]
  [markup.highlight]
    noClasses = true
    style = "monokai"
  [markup.goldmark]
    [markup.goldmark.renderer]
      # Required: existing blog content uses inline HTML (links with target="_blank",
      # embedded videos, styled elements). Disabling this would break rendered posts.
      # Content is author-controlled (single-author blog), not user-generated.
      unsafe = true

ignoreFiles = ["buildspec\\.yaml", "publish\\.sh", "docker/.*", "scripts/.*"]

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 2

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 3

[[menu.main]]
  name = "Podcast"
  url = "https://sebs.to/paef"
  weight = 4

[[menu.main]]
  name = "Old Blog"
  url = "/old/"
  weight = 5
