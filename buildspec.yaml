version: 0.2
phases:
  pre_build:
    commands:
      - echo Downloading PaperMod theme on $(date)
      - rm -rf themes/PaperMod
      - curl -L https://github.com/adityatelange/hugo-PaperMod/archive/refs/tags/v8.0.tar.gz | tar xz -C themes
      - mv themes/hugo-PaperMod-8.0 themes/PaperMod
  build:
    commands:
      - echo Build started on $(date)
      - hugo --minify
  post_build:
    commands:
      - echo Build completed on $(date)
artifacts:
  type: zip
  files:
    - '**/*'
  name: sebinthecloud-$(date +%Y%m%d%H%M%S).zip
  base-directory: 'public'
cache:
  paths:
    - 'resources/**/*'
